name: Frontend Check Summary Bot

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'FrontEnd/**'
      - '.github/workflows/frontend-check-summary.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-and-summarize:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter Check
        id: lint
        continue-on-error: true
        run: |
          if npm run lint; then
            echo "status=✅ Passed" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
          fi

      - name: Run TypeScript Verification
        id: tsc
        continue-on-error: true
        run: |
          if npx tsc --noEmit; then
            echo "status=✅ Passed" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
          fi

      - name: Run Unit Tests
        id: test
        continue-on-error: true
        run: |
          if npm run test -- --watchAll=false; then
            echo "status=✅ Passed" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
          fi

      - name: Post or Update PR Summary Comment
        uses: actions/github-script@v7
        with:
          script: |
            const lintStatus = "${{ steps.lint.outputs.status }}";
            const tscStatus = "${{ steps.tsc.outputs.status }}";
            const testStatus = "${{ steps.test.outputs.status }}";
            
            const commentBody = `
            ### 🤖 FrontEnd Check Quality Report Summary
            
            | Check Type | Status Verification |
            | :--- | :--- |
            | **Code Linter / Style Formatting** | ${lintStatus || '⚠️ Skipped'} |
            | **TypeScript Compile Strictness (`tsc`)** | ${tscStatus || '⚠️ Skipped'} |
            | **Unit Suite Tests Automation** | ${testStatus || '⚠️ Skipped'} |
            
            ---
            *Report generated automatically on commit updates.*
            `;
            
            // Look for an existing bot comment to avoid spamming the PR timeline
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('FrontEnd Check Quality Report Summary')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
            
            // If any critical frontend phase failed, force the workflow job to exit with an error code safely
            if (lintStatus.includes('❌') || tscStatus.includes('❌') || testStatus.includes('❌')) {
              core.setFailed('One or more frontend status validation suites failed check criteria.');
            }